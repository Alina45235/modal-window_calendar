<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Модальное окно</title>
  </head>
  <body>
    <div class="page">
      <div class="block_1">
        <h2 class="title">МОДАЛЬНОЕ ОКНО</h2>
        <button class="btn open-btn">Открыть</button>
      </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
      <div class="modal">
        <h3 class="modal-title">Hello from Modal Window!</h3>
        <p class="modal-text">Это модальное окно появилось</p>
        <button class="btn close-btn">Закрыть</button>
      </div>
    </div>

    <div class="block_2">
      <h2 class="title">КАЛЕНДАРЬ</h2>
      <div class="calendar-inputs">
        <div class="input-group">
          <label>Month:</label>
          <input type="number" id="monthInput" min="1" max="12" value="8" />
        </div>
        <div class="input-group">
          <label>Year:</label>
          <input
            type="number"
            id="yearInput"
            min="1900"
            max="2100"
            value="2018"
          />
        </div>
        <button class="btn generate-btn">Generate</button>
      </div>
      <div class="calendar-container">
        <h3 class="month-year" id="monthYear">August, 2018</h3>
        <table class="calendar-table" id="calendarTable">
          <thead>
            <tr>
              <th>MON</th>
              <th>TUE</th>
              <th>WED</th>
              <th>THU</th>
              <th>FRI</th>
              <th>SAT</th>
              <th>SUN</th>
            </tr>
          </thead>
          <tbody id="calendarBody"></tbody>
        </table>
      </div>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
